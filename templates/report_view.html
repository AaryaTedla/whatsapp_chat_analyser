<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Report Detail | Lumira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-900: #071423;
        --bg-800: #0e1b2f;
        --panel: rgba(10, 23, 39, 0.8);
        --line: rgba(170, 199, 255, 0.2);
        --text: #eaf3ff;
        --muted: #90a5c3;
        --cyan: #27d9c1;
        --blue: #4ea4ff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Manrope, "Segoe UI", sans-serif;
        background:
          radial-gradient(820px 340px at 0 0, rgba(39, 217, 193, 0.2), transparent 62%),
          radial-gradient(600px 300px at 100% 8%, rgba(78, 164, 255, 0.2), transparent 68%),
          linear-gradient(150deg, var(--bg-900), var(--bg-800));
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 70px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font: 700 28px/1.1 "Space Grotesk", sans-serif;
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #04252f;
        background: linear-gradient(145deg, var(--cyan), #66f0de);
        border-radius: 11px;
        padding: 9px 12px;
        font: 700 13px/1 "Space Grotesk", sans-serif;
        letter-spacing: 0.2px;
      }

      .btn.secondary {
        color: #dceafd;
        border: 1px solid rgba(170, 199, 255, 0.26);
        background: rgba(15, 31, 50, 0.74);
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 14px;
      }

      .grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 920px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .meta {
        color: #d8e6fc;
        line-height: 1.6;
        font-size: 14px;
      }

      .meta b { color: #9fc6ff; }

      h2 {
        margin: 0 0 10px;
        color: #9fc6ff;
        font: 700 13px/1 "Space Grotesk", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      h3 {
        margin: 10px 0 6px;
        font: 700 16px/1.2 "Space Grotesk", sans-serif;
      }

      p {
        margin: 0;
        line-height: 1.55;
      }

      ul {
        margin: 6px 0 0;
        padding-left: 18px;
      }

      li { margin-bottom: 4px; }

      .kv {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .kv div {
        border: 1px solid rgba(170, 199, 255, 0.18);
        border-radius: 12px;
        padding: 9px;
        background: rgba(11, 27, 45, 0.72);
      }

      .kv small {
        color: var(--muted);
        display: block;
        font-size: 11px;
      }

      .kv strong {
        margin-top: 3px;
        display: block;
        font-size: 16px;
      }

      .error {
        border: 1px solid rgba(255, 122, 132, 0.4);
        background: rgba(66, 13, 23, 0.66);
        color: #ffd4d9;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <h1 id="title">Report</h1>
          <p class="sub">Detailed breakdown of a saved chat analysis</p>
        </div>
        <div class="row">
          <a class="btn secondary" href="/">New analysis</a>
          <a class="btn secondary" href="/reports">All reports</a>
          <a id="downloadBtn" class="btn" href="#">Download TXT</a>
        </div>
      </div>

      <section id="error" class="card error hidden"></section>

      <section id="content" class="hidden">
        <article class="card meta" id="meta"></article>

        <div class="grid">
          <article class="card">
            <h2>AI Summary</h2>
            <h3>Overall vibe</h3>
            <p id="aiVibe"></p>
            <h3>Top recurring topics</h3>
            <ul id="aiTopics"></ul>
            <h3>Funny observation</h3>
            <p id="aiFunny"></p>
          </article>

          <article class="card">
            <h2>Stats Snapshot</h2>
            <div class="kv" id="statsKv"></div>
          </article>
        </div>
      </section>
    </div>

    <script>
      function getReportId() {
        const parts = window.location.pathname.split("/").filter(Boolean);
        return parts[1] || null;
      }

      function showError(message) {
        const box = document.getElementById("error");
        box.textContent = message;
        box.style.display = "block";
      }

      async function loadReport() {
        const reportId = getReportId();
        if (!reportId) {
          showError("Invalid report URL.");
          return;
        }

        document.getElementById("title").textContent = "Report #" + reportId;
        document.getElementById("downloadBtn").href = "/reports/" + reportId + "/txt";

        try {
          const res = await fetch("/api/reports/" + reportId);
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.detail || "Could not load report.");
          }

          const uploaded = new Date(data.uploaded_at).toLocaleString();
          document.getElementById("meta").innerHTML =
            "<div><b>File:</b> " + data.filename + "</div>" +
            "<div><b>Uploaded at:</b> " + uploaded + "</div>" +
            "<div><b>Messages:</b> " + data.message_count + "</div>";

          const ai = data.ai || {};
          document.getElementById("aiVibe").textContent = ai.vibe_summary || "N/A";
          document.getElementById("aiFunny").textContent = ai.funny_observation || "N/A";

          const topics = ai.top_3_topics || [];
          const list = document.getElementById("aiTopics");
          list.innerHTML = "";
          if (!topics.length) {
            const li = document.createElement("li");
            li.textContent = "No topics returned.";
            list.appendChild(li);
          } else {
            topics.forEach((topic) => {
              const li = document.createElement("li");
              li.textContent = topic;
              list.appendChild(li);
            });
          }

          const stats = data.stats || {};
          const topWordsLen = (stats.top_words || []).length;
          const kv = document.getElementById("statsKv");
          kv.innerHTML =
            "<div><small>Total messages</small><strong>" + (stats.total_messages ?? "-") + "</strong></div>" +
            "<div><small>Unique senders</small><strong>" + (stats.unique_senders ?? "-") + "</strong></div>" +
            "<div><small>Top words tracked</small><strong>" + topWordsLen + "</strong></div>" +
            "<div><small>JSON endpoint</small><strong>/api/reports/" + reportId + "</strong></div>";

          document.getElementById("content").style.display = "block";
        } catch (err) {
          showError("Error: " + err.message);
        }
      }

      loadReport();
    </script>
  </body>
</html>
